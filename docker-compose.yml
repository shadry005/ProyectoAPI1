version: '3.9'

services:

  db:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  api:
    build: ./api
    container_name: api_service
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
    depends_on:
      - db

  web:
    build: ./web
    container_name: django_web
    restart: always
    ports:
      - "8000:8000"
    environment:
      - API_HOST=api:3000
    depends_on:
      - api

volumes:
  db_data: